<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CompanioNation™ — Loading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .container { text-align: center; padding: 2em; max-width: 500px; }
        .logo-text { font-size: 2.2em; font-weight: bold; color: #1b6ec2; margin-bottom: 0.2em; }
        .tagline { color: #555; font-size: 1.1em; font-style: italic; margin-bottom: 2em; }
        .spinner {
            width: 48px; height: 48px; border: 4px solid #e0e0e0;
            border-top-color: #1b6ec2; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 1em;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { font-size: 1.05em; color: #555; }
        .reload-hint { margin-top: 1.5em; font-size: 0.85em; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-text">CompanioNation&#8482;</div>
        <div class="tagline">Online Dating for People, Not Profits</div>
        <div class="spinner"></div>
        <p>Starting up &mdash; just a moment&hellip;</p>
        <p class="reload-hint">This page will refresh automatically.</p>
    </div>
    <script>setTimeout(function() { location.reload(); }, 10000);</script>
</body>
</html>
